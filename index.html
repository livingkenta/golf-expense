<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゴルフ交通費割り勘</title>

  <!-- PWA: マニフェスト -->
  <link rel="manifest" href="./manifest.json">

  <!-- PWA: テーマカラー（Android Chrome のアドレスバー色） -->
  <meta name="theme-color" content="#10b981">

  <!-- PWA: iOS Safari 向け設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ゴルフ割り勘">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <style>
    /* ベースリセットとスマホ向け基本スタイル */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN",
                   "Noto Sans JP", sans-serif;
      font-size: 16px;
      background: #f5f7fa;
      color: #333;
      /* スマホ縦画面で中央寄せ */
      display: flex;
      justify-content: center;
      padding: 16px;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
      color: #2d6a4f;
    }

    /* カードコンポーネント */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: bold;
      color: #666;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* 人数選択ラジオ */
    .count-selector {
      display: flex;
      gap: 12px;
    }

    .count-selector label {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: border-color 0.2s, background 0.2s;
    }

    /* 選択中の人数ラジオをハイライト */
    .count-selector input[type="radio"]:checked + span {
      color: #2d6a4f;
      font-weight: bold;
    }

    .count-selector label:has(input:checked) {
      border-color: #2d6a4f;
      background: #e8f5e9;
    }

    .count-selector input[type="radio"] {
      accent-color: #2d6a4f;
    }

    /* メンバー入力エリア */
    #members-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .member-row {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px;
    }

    .member-label {
      font-size: 0.85rem;
      font-weight: bold;
      color: #2d6a4f;
      margin-bottom: 8px;
    }

    /* 各入力フィールド */
    .field {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field-label {
      font-size: 0.82rem;
      color: #666;
      white-space: nowrap;
      width: 100px;
      flex-shrink: 0;
    }

    .name-input-wrap {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 6px;
    }

    .name-select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      background: #fff;
      appearance: none;
      -webkit-appearance: none;
    }

    .name-select:focus {
      outline: none;
      border-color: #2d6a4f;
      box-shadow: 0 0 0 2px rgba(45, 106, 79, 0.2);
    }

    .field input[type="text"],
    .field input[type="number"] {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      /* スマホでズームしないよう16px以上を保つ */
      appearance: none;
      -webkit-appearance: none;
    }

    .field input:focus {
      outline: none;
      border-color: #2d6a4f;
      box-shadow: 0 0 0 2px rgba(45, 106, 79, 0.2);
    }

    .unit {
      font-size: 0.9rem;
      color: #666;
      white-space: nowrap;
    }

    /* 支払い・受け取り 2列グリッド */
    .amount-grid {
      display: grid;
      /* ラベル列 | 支払い列 | 受け取り列 */
      grid-template-columns: 5.8em 1fr 1fr;
      gap: 5px 6px;
      align-items: center;
      margin-top: 8px;
    }

    .ag-header {
      font-size: 0.78rem;
      font-weight: bold;
      text-align: center;
      padding-bottom: 3px;
      border-bottom: 2px solid;
    }

    /* 支払いヘッダーは赤、受け取りヘッダーは緑 */
    .ag-header-pay  { color: #c0392b; border-color: #c0392b; }
    .ag-header-recv { color: #2d6a4f; border-color: #2d6a4f; }

    .ag-label {
      font-size: 0.8rem;
      color: #555;
      padding-right: 2px;
    }

    .ag-cell {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .ag-cell input[type="number"] {
      width: 100%;
      min-width: 0;
      padding: 6px 6px;
      border: 1.5px solid;
      border-radius: 6px;
      font-size: 0.95rem;
      appearance: none;
      -webkit-appearance: none;
    }

    .ag-cell .unit {
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    /* 支払い欄：薄い赤（.field 内でも .ag-cell 内でも共通） */
    input.inp-pay {
      border-color: #ffb3b3 !important;
      background: #fff8f8;
    }
    input.inp-pay:focus {
      border-color: #c0392b !important;
      box-shadow: 0 0 0 2px rgba(192, 57, 43, 0.15);
      outline: none;
    }

    /* 受け取り欄：薄い緑 */
    input.inp-recv {
      border-color: #a8d5b5 !important;
      background: #f5fdf7;
    }
    input.inp-recv:focus {
      border-color: #2d6a4f !important;
      box-shadow: 0 0 0 2px rgba(45, 106, 79, 0.15);
      outline: none;
    }

    /* 計算ボタン */
    #calc-btn {
      background: #2d6a4f;
      color: #fff;
      transition: background 0.2s;
    }

    #calc-btn:active {
      background: #1b4332;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .action-row button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
    }

    #clear-btn {
      background: #6c757d;
      color: #fff;
    }

    #clear-btn:active {
      background: #555e66;
    }

    /* エラーメッセージ */
    #error-msg {
      display: none;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      color: #856404;
      margin-bottom: 16px;
    }

    #sync-status {
      display: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    #sync-status.loading {
      display: block;
      background: #eef6ff;
      border: 1px solid #b7d8ff;
      color: #2d4f7c;
    }

    #sync-status.warn {
      display: block;
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #856404;
    }

    /* 結果エリア（計算前は非表示） */
    #result-area {
      display: none;
    }

    .result-summary {
      font-size: 0.95rem;
      margin-bottom: 8px;
      color: #444;
    }

    .result-summary span {
      font-weight: bold;
      color: #2d6a4f;
    }

    /* 各人の差額テーブル */
    .balance-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .balance-table th {
      text-align: left;
      color: #888;
      font-weight: normal;
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }

    .balance-table td {
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .balance-table td:last-child {
      text-align: right;
    }

    /* 受取＝緑、支払＝赤でわかりやすく */
    .positive { color: #2d6a4f; font-weight: bold; }
    .negative { color: #c0392b; font-weight: bold; }

    /* 清算手順リスト */
    .transactions {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .transaction-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .transaction-arrow {
      color: #888;
      margin: 0 6px;
    }

    .transaction-amount {
      font-weight: bold;
      color: #c0392b;
    }

    /* 「取引なし」メッセージ */
    .no-transactions {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      padding: 12px 0;
    }

    /* メンバー管理モーダル */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: bold;
      color: #2d6a4f;
    }

    .modal-close {
      border: none;
      background: transparent;
      font-size: 1.2rem;
      color: #666;
      cursor: pointer;
      padding: 4px;
    }

    .member-manage-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 50vh;
      overflow-y: auto;
    }

    .manage-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.9rem;
      background: #fafafa;
    }

    .manage-delete {
      border: none;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.85rem;
      font-weight: bold;
      color: #fff;
      background: #c0392b;
      cursor: pointer;
    }

    .manage-empty {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      padding: 12px 0;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .round-list-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .round-create-btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px;
      background: #2d6a4f;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    .round-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .round-item {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px;
      background: #fff;
      text-align: left;
      cursor: pointer;
    }

    .round-item-date {
      font-size: 0.8rem;
      color: #5f6c7b;
      margin-bottom: 4px;
    }

    .round-item-title {
      font-size: 1rem;
      font-weight: bold;
      color: #1f2937;
      margin-bottom: 6px;
    }

    .round-item-meta {
      font-size: 0.85rem;
      color: #4b5563;
    }

    .round-empty {
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      padding: 14px;
      font-size: 0.9rem;
      color: #6b7280;
      background: #f8fafc;
    }

    .list-footer {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }

    .link-btn {
      border: none;
      background: transparent;
      color: #2d6a4f;
      font-size: 0.92rem;
      text-decoration: underline;
      cursor: pointer;
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .back-btn {
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      background: #64748b;
      color: #fff;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }

    .round-title-wrap {
      flex: 1;
      min-width: 0;
    }

    .round-title-display {
      display: block;
      font-size: 1.1rem;
      font-weight: bold;
      color: #2d6a4f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: text;
    }

    .round-title-input {
      width: 100%;
      display: none;
      border: 1px solid #9ca3af;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 1rem;
      font-weight: bold;
    }

    .line-share-btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px;
      margin-top: 12px;
      background: #06c755;
      color: #fff;
      font-size: 1.02rem;
      font-weight: bold;
      cursor: pointer;
    }

    .danger-zone {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }

    .danger-btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 13px;
      background: #c0392b;
      color: #fff;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
    }

    .confirm-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .confirm-actions button {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 10px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    #delete-modal-cancel {
      background: #6b7280;
    }

    #delete-modal-confirm {
      background: #c0392b;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>⛳ ゴルフ交通費割り勘</h1>
  <div id="sync-status" class="loading">読み込み中...</div>

  <section id="screen-list" class="screen active">
    <div class="card round-list-card">
      <button id="create-round-btn" type="button" class="round-create-btn">＋ 新規ラウンド作成</button>
      <div id="rounds-list" class="round-list"></div>
    </div>
    <div class="list-footer">
      <button id="list-manage-members-btn" type="button" class="link-btn">メンバー管理</button>
    </div>
  </section>

  <section id="screen-detail" class="screen">
    <div class="detail-header">
      <button id="detail-back-btn" type="button" class="back-btn">← 戻る</button>
      <div class="round-title-wrap">
        <span id="round-title-display" class="round-title-display">ラウンド</span>
        <input id="round-title-input" class="round-title-input" type="text" maxlength="60" aria-label="ラウンドタイトル">
      </div>
    </div>

    <div class="card">
      <div class="card-title">人数</div>
      <div class="count-selector">
        <label>
          <input type="radio" name="count" value="3" id="count3">
          <span>3人</span>
        </label>
        <label>
          <input type="radio" name="count" value="4" id="count4" checked>
          <span>4人</span>
        </label>
      </div>
    </div>

    <div class="card">
      <div class="card-title">メンバー情報</div>
      <div id="members-area"></div>
    </div>

    <div id="error-msg"></div>

    <div class="action-row">
      <button id="calc-btn" type="button">計算する</button>
      <button id="clear-btn" type="button">クリア</button>
    </div>

    <div id="result-area">
      <div class="card">
        <div class="card-title">集計</div>
        <p class="result-summary">交通費合計：<span id="res-total"></span></p>
        <p class="result-summary">1人あたり（目安）：<span id="res-per"></span></p>
      </div>

      <div class="card">
        <div class="card-title">各人の収支</div>
        <table class="balance-table">
          <thead>
            <tr>
              <th>名前</th>
              <th>交通費±</th>
              <th>その他</th>
              <th>最終差額</th>
            </tr>
          </thead>
          <tbody id="res-balances"></tbody>
        </table>
      </div>

      <div class="card">
        <div class="card-title">清算手順</div>
        <ul class="transactions" id="res-transactions"></ul>
      </div>
    </div>

    <button id="line-share-btn" class="line-share-btn" type="button">LINE で送る</button>

    <div class="danger-zone">
      <button id="delete-round-btn" class="danger-btn" type="button">このラウンドを削除</button>
    </div>
  </section>
</div>

<div id="member-modal" class="modal-overlay" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="member-modal-title">
    <div class="modal-header">
      <h2 id="member-modal-title" class="modal-title">メンバー管理</h2>
      <button type="button" id="member-modal-close" class="modal-close" aria-label="閉じる">×</button>
    </div>
    <div id="member-manage-list" class="member-manage-list"></div>
  </div>
</div>

<div id="delete-round-modal" class="modal-overlay" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
    <div class="modal-header">
      <h2 id="delete-modal-title" class="modal-title">ラウンド削除確認</h2>
    </div>
    <p>このラウンドを削除します。よろしいですか？</p>
    <div class="confirm-actions">
      <button id="delete-modal-cancel" type="button">キャンセル</button>
      <button id="delete-modal-confirm" type="button">削除する</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
  import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js';
  import {
    getFirestore,
    collection,
    query,
    orderBy,
    doc,
    setDoc,
    deleteDoc,
    onSnapshot,
    serverTimestamp,
  } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

  const UNIT = 10;

  const firebaseConfig = {
    apiKey: 'AIzaSyBjPwiFnrSDUwO7kzJZ3iqcBZC_gLTJeac',
    authDomain: 'golf-expense.firebaseapp.com',
    projectId: 'golf-expense',
    storageBucket: 'golf-expense.firebasestorage.app',
    messagingSenderId: '460684791326',
    appId: '1:460684791326:web:75b4c752732e003bde680f',
  };

  const appState = {
    memberProfiles: [],
    roundsList: [],
    firestoreDb: null,
    firebaseReady: false,
    membersUnsubscribe: null,
    roundsUnsubscribe: null,
    roundDetailUnsubscribe: null,
    currentRoundId: null,
    currentRoundData: null,
    titleManuallyEdited: false,
    localRounds: {},
    saveTimer: null,
    isApplyingRound: false,
    lastCalculated: null,
    hasCalculated: false,
  };

  function fmt(n) {
    return n.toLocaleString('ja-JP') + '円';
  }

  function floorUnit(n) {
    return Math.floor(n / UNIT) * UNIT;
  }

  function ymdToday() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function makeRoundId() {
    if (window.crypto && typeof window.crypto.randomUUID === 'function') {
      return window.crypto.randomUUID();
    }
    return 'round-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
  }

  function makeDefaultTitle(date) {
    return `${date} ラウンド`;
  }

  function makeTitleFromMembers(date, members) {
    const names = members
      .map(m => (typeof m.name === 'string' ? m.name.trim() : ''))
      .filter(Boolean);
    if (names.length === 0) {
      return makeDefaultTitle(date);
    }
    return `${date} ${names.join('・')}`;
  }

  function toSafeInt(value) {
    const n = Number(value);
    if (!Number.isFinite(n)) return 0;
    return Math.max(0, Math.floor(n));
  }

  function withSign(value) {
    if (value > 0) return '+' + value.toLocaleString('ja-JP');
    if (value < 0) return '-' + Math.abs(value).toLocaleString('ja-JP');
    return '0';
  }

  function currentTitle() {
    const input = document.getElementById('round-title-input').value.trim();
    if (input) return input;
    if (appState.currentRoundData && appState.currentRoundData.date) {
      return makeDefaultTitle(appState.currentRoundData.date);
    }
    return makeDefaultTitle(ymdToday());
  }

  function normalizeRoundMember(obj) {
    return {
      name: typeof obj?.name === 'string' ? obj.name.trim() : '',
      transit: toSafeInt(obj?.expense),
      car: toSafeInt(obj?.carPaid),
      otherPay: toSafeInt(obj?.otherPay),
      otherRecv: toSafeInt(obj?.otherReceive),
    };
  }

  function roundMembersToDocMembers(members) {
    return members.map(m => ({
      name: m.name,
      expense: toSafeInt(m.transit),
      carPaid: toSafeInt(m.car),
      otherPay: toSafeInt(m.otherPay),
      otherReceive: toSafeInt(m.otherRecv),
    }));
  }

  function docToRound(id, data) {
    const date = typeof data.date === 'string' && data.date ? data.date : ymdToday();
    const members = Array.isArray(data.members)
      ? data.members.map(normalizeRoundMember)
      : [];
    const settlement = Array.isArray(data.settlement)
      ? data.settlement
          .map(t => ({
            from: typeof t?.from === 'string' ? t.from : '',
            to: typeof t?.to === 'string' ? t.to : '',
            amount: toSafeInt(t?.amount),
          }))
          .filter(t => t.from && t.to)
      : null;

    return {
      id,
      date,
      title: typeof data.title === 'string' && data.title.trim() ? data.title.trim() : makeDefaultTitle(date),
      titleManuallyEdited: typeof data.titleManuallyEdited === 'boolean'
        ? data.titleManuallyEdited
        : (typeof data.title === 'string' && data.title.trim() && data.title.trim() !== makeDefaultTitle(date)),
      members,
      settlement,
      totalAmount: toSafeInt(data.totalAmount),
      perPersonAmount: toSafeInt(data.perPersonAmount),
      createdAtMs: toSafeInt(data.createdAtMs),
      createdAt: data.createdAt,
      updatedAt: data.updatedAt,
    };
  }

  function roundSortValue(round) {
    if (Number.isFinite(round.createdAtMs) && round.createdAtMs > 0) {
      return round.createdAtMs;
    }
    if (round.createdAt && typeof round.createdAt.toMillis === 'function') {
      return round.createdAt.toMillis();

    return 0;

  function renderResultFromData(members, settlement = null, totalAmount = null, perPersonAmount = null, doScroll = true) {
    const results = calcBurdens(members);
    const transactions = settlement || calcTransactions(results);

    const total = Number.isFinite(totalAmount) && totalAmount >= 0
      ? totalAmount
      : members.reduce((sum, m) => sum + m.transit + m.car, 0);
    const per = Number.isFinite(perPersonAmount) && perPersonAmount >= 0
      ? perPersonAmount
      : Math.round(total / Math.max(members.length, 1));

    document.getElementById('res-total').textContent = fmt(total);
    document.getElementById('res-per').textContent = fmt(per) + '（10円単位に調整済み）';

    const tbody = document.getElementById('res-balances');
    tbody.innerHTML = '';
    results.forEach(r => {
      const tr = document.createElement('tr');
      const tCls = r.tBalance >= 0 ? 'positive' : 'negative';
      const oCls = r.otherNet > 0 ? 'positive' : r.otherNet < 0 ? 'negative' : '';
      const bCls = r.balance >= 0 ? 'positive' : 'negative';
      const sign = v => v >= 0 ? '+' : '';
      tr.innerHTML = `
        <td>${r.name}</td>
        <td class="${tCls}">${sign(r.tBalance)}${r.tBalance.toLocaleString('ja-JP')}円</td>
        <td class="${oCls}">${sign(r.otherNet)}${r.otherNet.toLocaleString('ja-JP')}円</td>
        <td class="${bCls}">${sign(r.balance)}${r.balance.toLocaleString('ja-JP')}円</td>
      `;
      tbody.appendChild(tr);
    });

    const txList = document.getElementById('res-transactions');
    txList.innerHTML = '';
    if (!transactions || transactions.length === 0) {
      txList.innerHTML = '<li class="no-transactions">清算不要です</li>';
    } else {
      transactions.forEach(tx => {
        const li = document.createElement('li');
        li.className = 'transaction-item';
        li.innerHTML = `
          <span>${tx.from}</span>
          <span class="transaction-arrow">→</span>
          <span>${tx.to}</span>
          <span class="transaction-amount">${fmt(tx.amount)}</span>
        `;
        txList.appendChild(li);
      });
    }

    const resultArea = document.getElementById('result-area');
    resultArea.style.display = 'block';
    if (doScroll) {
      resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    appState.lastCalculated = {
      members,
      results,
      settlement: transactions,
      totalAmount: total,
      perPersonAmount: per,
    };
    appState.hasCalculated = true;
  }

  function hideResultArea() {
    document.getElementById('result-area').style.display = 'none';
    document.getElementById('res-balances').innerHTML = '';
    document.getElementById('res-transactions').innerHTML = '';
    document.getElementById('res-total').textContent = '';
    document.getElementById('res-per').textContent = '';

  function validate(members) {
    const numFields = [
      ['transit', '個人交通費'],
      ['car', '車代立替'],
      ['otherPay', 'その他（支払い）'],
      ['otherRecv', 'その他（受け取り）'],
    ];

    for (let i = 0; i < members.length; i++) {
      const m = members[i];
      if (!m.name) return `${i + 1}人目の名前を入力してください`;
      for (const [field, label] of numFields) {
        if (!Number.isFinite(m[field]) || m[field] < 0) {
          return `${m.name} の${label}が不正です（0以上の整数）`;
        }
      }
    }

    const sumOtherPay = members.reduce((s, m) => s + m.otherPay, 0);
    const sumOtherRecv = members.reduce((s, m) => s + m.otherRecv, 0);
    if (sumOtherPay !== sumOtherRecv) {
      return `その他の支払い合計（${fmt(sumOtherPay)}）と受け取り合計（${fmt(sumOtherRecv)}）が一致していません。差額：${fmt(Math.abs(sumOtherPay - sumOtherRecv))}`;
    }

    return null;
  }

  function calcBurdens(members) {
    const n = members.length;
    const tPaid = members.map(m => m.transit + m.car);
    const tTotal = tPaid.reduce((s, v) => s + v, 0);
    const numCar = members.filter(m => m.car > 0).length;
    const numNonCar = n - numCar;

    let nonCarBurden;
    let carBurden;
    if (numCar === 0) {
      nonCarBurden = floorUnit(tTotal / n);
      carBurden = nonCarBurden;
    } else {
      const exactPer = tTotal / n;
      nonCarBurden = numNonCar > 0 ? Math.ceil(exactPer / UNIT) * UNIT : 0;
      const totalCarBurden = tTotal - nonCarBurden * numNonCar;
      carBurden = floorUnit(totalCarBurden / numCar);
    }

    return members.map((m, i) => {
      const burden = m.car > 0 ? carBurden : nonCarBurden;
      const tBalance = tPaid[i] - burden;
      const otherNet = m.otherRecv - m.otherPay;
      const balance = tBalance + otherNet;
      return { name: m.name, tPaid: tPaid[i], burden, tBalance, otherNet, balance };
    });
  }

  function calcTransactions(results) {
    const balances = results.map(r => ({ name: r.name, balance: r.balance }));
    const transactions = [];

    while (true) {
      const maxReceiver = balances.reduce((a, b) => (a.balance > b.balance ? a : b));
      const maxPayer = balances.reduce((a, b) => (a.balance < b.balance ? a : b));
      if (maxReceiver.balance <= 0 || maxPayer.balance >= 0) break;

      const rawAmount = Math.min(maxReceiver.balance, -maxPayer.balance);
      const amount = floorUnit(rawAmount);
      if (amount < UNIT) break;

      transactions.push({ from: maxPayer.name, to: maxReceiver.name, amount });
      maxReceiver.balance -= amount;
      maxPayer.balance += amount;
    }

    return transactions;
  }

  async function updateProfilesFromMembers(members) {
    if (!appState.firebaseReady || !appState.firestoreDb) return;

    const tasks = [];
    members.forEach(m => {
      const name = m.name.trim();
      if (!name || name.includes('/')) return;
      tasks.push(
        setDoc(
          doc(appState.firestoreDb, 'members', name),
          {
            name,
            defaultExpense: toSafeInt(m.transit),
            updatedAt: serverTimestamp(),
          },
          { merge: true }
        )
      );
    });

    await Promise.all(tasks);
  }

  async function deleteProfile(profile) {
    appState.memberProfiles = appState.memberProfiles.filter(p => p.id !== profile.id);
    refreshNameSources();

    if (!appState.firebaseReady || !appState.firestoreDb) return;
    if (!profile.name || profile.name.includes('/')) return;
    await deleteDoc(doc(appState.firestoreDb, 'members', profile.name));
  }

  function upsertLocalRound(roundData) {
    appState.localRounds[roundData.id] = { ...roundData };
  }

  async function createNewRound() {
    const date = ymdToday();
    const roundId = makeRoundId();
    const createdAtMs = Date.now();
    const payload = {
      date,
      title: makeDefaultTitle(date),
      titleManuallyEdited: false,
      members: [],
      settlement: [],
      totalAmount: 0,
      perPersonAmount: 0,
      createdAtMs,
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp(),
    };

    if (appState.firebaseReady && appState.firestoreDb) {
      await setDoc(doc(appState.firestoreDb, 'rounds', roundId), payload);
      openRoundDetail(roundId, true);
      return;
    }

    const localRound = {
      id: roundId,
      date,
      title: payload.title,
      titleManuallyEdited: false,
      members: [],
      settlement: [],
      totalAmount: 0,
      perPersonAmount: 0,
      createdAtMs,
    };
    upsertLocalRound(localRound);
    openRoundDetail(roundId, true);
    setSyncStatus('クラウド未接続のため、このラウンドは端末内のみです。', 'warn');
  }

  function applyRoundToUI(round) {
    appState.isApplyingRound = true;
    appState.currentRoundData = round;
    appState.titleManuallyEdited = !!round.titleManuallyEdited;
    renderRoundHeader(round);

    const members = Array.isArray(round.members) && round.members.length > 0
      ? round.members
      : [
          { name: '', transit: 0, car: 0, otherPay: 0, otherRecv: 0 },
          { name: '', transit: 0, car: 0, otherPay: 0, otherRecv: 0 },
          { name: '', transit: 0, car: 0, otherPay: 0, otherRecv: 0 },
          { name: '', transit: 0, car: 0, otherPay: 0, otherRecv: 0 },
        ];

    const count = setCountFromMembers(members);
    buildMemberRows(count, members.slice(0, count));
    hideError();

    if (round.settlement) {
      renderResultFromData(
        members.slice(0, count),
        round.settlement,
        round.totalAmount,
        round.perPersonAmount,
        false
      );
    } else {
      hideResultArea();
    }

    appState.isApplyingRound = false;
  }

  function unsubscribeRoundDetail() {
    if (appState.roundDetailUnsubscribe) {
      appState.roundDetailUnsubscribe();
      appState.roundDetailUnsubscribe = null;
    }
  }

  function subscribeRoundDetail(roundId) {
    unsubscribeRoundDetail();

    if (appState.localRounds[roundId]) {
      applyRoundToUI(appState.localRounds[roundId]);
      return;
    }

    if (!appState.firebaseReady || !appState.firestoreDb) {
      hideResultArea();
      buildMemberRows(4);
      return;
    }

    appState.roundDetailUnsubscribe = onSnapshot(
      doc(appState.firestoreDb, 'rounds', roundId),
      snap => {
        if (!snap.exists()) {
          showError('ラウンドが見つかりません。');
          showScreen('list');
          setRouteRound('', 'replace');
          return;
        }
        const round = docToRound(snap.id, snap.data() || {});
        appState.currentRoundData = round;
        // 入力中は再描画を抑止し、カーソル位置が飛ばないようにする。
        if (appState.currentRoundId === round.id && isEditingRoundForm()) {
          return;
        }
        applyRoundToUI(round);
      },
      error => {
        console.error('[Firebase] ラウンド詳細取得エラー:', error);
        showError('ラウンド取得に失敗しました。通信状態を確認してください。');
      }
    );
  }

  function openRoundDetail(roundId, pushState = true) {
    appState.currentRoundId = roundId;
    showScreen('detail');
    subscribeRoundDetail(roundId);
    setRouteRound(roundId, pushState ? 'push' : 'replace');
  }

  function openRoundList(pushState = true) {
    unsubscribeRoundDetail();
    appState.currentRoundId = null;
    appState.currentRoundData = null;
    hideError();
    showScreen('list');
    if (pushState) {
      setRouteRound('', 'push');
    }

  function isEditingRoundForm() {
    const active = document.activeElement;
    if (!active) return false;
    if (active.id === 'round-title-input') return true;
    if (active.closest('#members-area')) return true;
    return false;
  }

  function sanitizeMembersForRound() {
    return collectMembersFromRows().slice(0, getSelectedCount());
  }

  function scheduleRoundAutosave() {
    if (appState.isApplyingRound || !appState.currentRoundId) return;
    if (appState.saveTimer) {
      clearTimeout(appState.saveTimer);
    }
    appState.saveTimer = setTimeout(() => {
      saveCurrentRoundDraft().catch(error => {
        console.error('[Firebase] ラウンド自動保存エラー:', error);
      });
    }, 400);
  }

  async function saveCurrentRoundDraft() {
    if (!appState.currentRoundId) return;
    const members = sanitizeMembersForRound();
    const title = currentTitle();
    const date = appState.currentRoundData?.date || ymdToday();

    const nextRound = {
      id: appState.currentRoundId,
      date,
      title,
      titleManuallyEdited: appState.titleManuallyEdited,
      members,
      settlement: appState.currentRoundData?.settlement || null,
      totalAmount: appState.currentRoundData?.totalAmount || 0,
      perPersonAmount: appState.currentRoundData?.perPersonAmount || 0,
    };
    appState.currentRoundData = nextRound;

    if (appState.localRounds[appState.currentRoundId] || !appState.firebaseReady || !appState.firestoreDb) {
      upsertLocalRound(nextRound);
      return;
    }

    await setDoc(
      doc(appState.firestoreDb, 'rounds', appState.currentRoundId),
      {
        date,
        title,
        titleManuallyEdited: appState.titleManuallyEdited,
        members: roundMembersToDocMembers(members),
        updatedAt: serverTimestamp(),
      },
      { merge: true }
    );
  }

  async function saveCalculationToRound(members, settlement, totalAmount, perPersonAmount) {
    if (!appState.currentRoundId) return;

    const title = currentTitle();
    const date = appState.currentRoundData?.date || ymdToday();
    const merged = {
      id: appState.currentRoundId,
      date,
      title,
      titleManuallyEdited: appState.titleManuallyEdited,
      members,
      settlement,
      totalAmount,
      perPersonAmount,
    };
    appState.currentRoundData = merged;

    if (appState.localRounds[appState.currentRoundId] || !appState.firebaseReady || !appState.firestoreDb) {
      upsertLocalRound(merged);
      return;
    }

    await setDoc(
      doc(appState.firestoreDb, 'rounds', appState.currentRoundId),
      {
        date,
        title,
        titleManuallyEdited: appState.titleManuallyEdited,
        members: roundMembersToDocMembers(members),
        settlement,
        totalAmount,
        perPersonAmount,
        updatedAt: serverTimestamp(),
      },
      { merge: true }
    );
  }

  async function deleteCurrentRound() {
    const roundId = appState.currentRoundId;
    if (!roundId) return;

    if (appState.localRounds[roundId]) {
      delete appState.localRounds[roundId];
      closeDeleteRoundModal();
      openRoundList(true);
      return;
    }

    if (!appState.firebaseReady || !appState.firestoreDb) {
      showError('クラウド未接続のため削除できません。');
      return;
    }

    await deleteDoc(doc(appState.firestoreDb, 'rounds', roundId));
    closeDeleteRoundModal();
    openRoundList(true);
  }

  function buildLineShareText() {
    if (!appState.lastCalculated) return '';

    const title = currentTitle();
    const members = appState.lastCalculated.members;
    const settlement = appState.lastCalculated.settlement || [];
    const totalAmount = appState.lastCalculated.totalAmount;
    const perPersonAmount = appState.lastCalculated.perPersonAmount;

    const maxNameLen = members.reduce((m, x) => Math.max(m, x.name.length), 0);
    const lines = [];
    lines.push(`【${title} 精算】`);
    lines.push('');
    lines.push('■ 各人の負担');

    members.forEach(m => {
      const padded = m.name.padEnd(maxNameLen, ' ');
      const traffic = (m.transit + m.car).toLocaleString('ja-JP');
      const other = withSign(m.otherRecv - m.otherPay);
      lines.push(`${padded}: 交通費 ${traffic}円、その他 ${other}円`);
    });

    lines.push('');
    lines.push(`合計: ${totalAmount.toLocaleString('ja-JP')}円（1人あたり ${perPersonAmount.toLocaleString('ja-JP')}円）`);
    lines.push('');
    lines.push('■ 清算');
    if (settlement.length === 0) {
      lines.push('清算不要です');
    } else {
      settlement.forEach(tx => {
        lines.push(`${tx.from} → ${tx.to}: ${tx.amount.toLocaleString('ja-JP')}円`);
      });
    }

    lines.push('');
    lines.push('ゴルフ割り勘アプリ');
    lines.push('https://livingkenta.github.io/golf-expense/');

    const text = lines.join('\n');
    if (text.length > 900) {
      console.warn('[LINE] 共有テキストが長い可能性があります。文字数:', text.length);
    }
    return text;
  }

  function openLineShare() {
    if (!appState.hasCalculated || !appState.lastCalculated) {
      window.alert('先に計算してください');
      return;
    }
    const text = buildLineShareText();
    const encoded = encodeURIComponent(text);
    const url = `https://line.me/R/msg/text/?${encoded}`;
    window.location.href = url;
  }

  function subscribeMembers() {
    if (!appState.firestoreDb) return;
    if (appState.membersUnsubscribe) appState.membersUnsubscribe();

    appState.membersUnsubscribe = onSnapshot(
      collection(appState.firestoreDb, 'members'),
      snapshot => {
        appState.memberProfiles = snapshot.docs
          .map(snap => {
            const data = snap.data() || {};
            return normalizeProfile({
              id: snap.id,
              name: typeof data.name === 'string' ? data.name : snap.id,
              defaultExpense: data.defaultExpense,
            });
          })
          .filter(Boolean)
          .sort((a, b) => a.name.localeCompare(b.name, 'ja'));

        if (document.querySelector('.member-row')) {
          refreshNameSources();
        }
      },
      error => {
        console.error('[Firebase] members 同期エラー:', error);
      }
    );
  }

  function subscribeRoundsList() {
    if (!appState.firestoreDb) return;
    if (appState.roundsUnsubscribe) appState.roundsUnsubscribe();

    appState.roundsUnsubscribe = onSnapshot(
      query(collection(appState.firestoreDb, 'rounds'), orderBy('createdAt', 'desc')),
      snapshot => {
        appState.roundsList = snapshot.docs
          .map(snap => docToRound(snap.id, snap.data() || {}))
          .sort((a, b) => {
            const diff = roundSortValue(b) - roundSortValue(a);
            if (diff !== 0) return diff;
            return b.id.localeCompare(a.id, 'ja');
          });
        renderRoundsList();
      },
      error => {
        console.error('[Firebase] rounds 一覧同期エラー:', error);
        setSyncStatus('クラウド同期に接続できません。オフラインで利用できます。', 'warn');
      }
    );
  }

  async function initFirebase() {
    setSyncStatus('読み込み中...', 'loading');

    try {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      appState.firestoreDb = getFirestore(app);

      // データは Firestore に保存されるが、第三者へ送信されない。
      await signInAnonymously(auth);

      appState.firebaseReady = true;
      subscribeMembers();
      subscribeRoundsList();
      if (appState.currentRoundId && !appState.localRounds[appState.currentRoundId]) {
        subscribeRoundDetail(appState.currentRoundId);
      }
      hideSyncStatus();
    } catch (error) {
      console.error('[Firebase] 初期化エラー:', error);
      appState.firebaseReady = false;
      appState.memberProfiles = [];
      appState.roundsList = [];
      renderRoundsList();
      setSyncStatus('クラウド同期に接続できません。オフラインで利用できます。', 'warn');
    }
  }

  function beginTitleEdit() {
    const disp = document.getElementById('round-title-display');
    const inp = document.getElementById('round-title-input');
    inp.style.display = 'block';
    disp.style.display = 'none';
    inp.focus();
    inp.select();
  }

  function commitTitleEdit() {
    const disp = document.getElementById('round-title-display');
    const inp = document.getElementById('round-title-input');
    const title = inp.value.trim() || makeDefaultTitle(appState.currentRoundData?.date || ymdToday());
    inp.value = title;
    disp.textContent = title;
    appState.titleManuallyEdited = true;
    if (appState.currentRoundData) {
      appState.currentRoundData.title = title;
      appState.currentRoundData.titleManuallyEdited = true;
    }
    disp.style.display = 'block';
    inp.style.display = 'none';
    scheduleRoundAutosave();
  }

  function bindEvents() {
    document.getElementById('create-round-btn').addEventListener('click', () => {
      createNewRound().catch(error => {
        console.error('[Round] 新規作成エラー:', error);
        setSyncStatus('新規ラウンド作成に失敗しました。通信状態を確認してください。', 'warn');
      });
    });

    document.getElementById('rounds-list').addEventListener('click', event => {
      const button = event.target.closest('.round-item');
      if (!button) return;
      const roundId = button.getAttribute('data-round-id');
      if (!roundId) return;
      openRoundDetail(roundId, true);
    });

    document.getElementById('detail-back-btn').addEventListener('click', () => {
      openRoundList(true);
    });

    document.getElementById('list-manage-members-btn').addEventListener('click', () => {
      openMemberManager();
    });

    document.getElementById('round-title-display').addEventListener('click', beginTitleEdit);
    document.getElementById('round-title-input').addEventListener('blur', commitTitleEdit);
    document.getElementById('round-title-input').addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        event.preventDefault();
        commitTitleEdit();
      }
      if (event.key === 'Escape') {
        const disp = document.getElementById('round-title-display');
        const inp = document.getElementById('round-title-input');
        inp.value = disp.textContent;
        inp.style.display = 'none';
        disp.style.display = 'block';
      }
    });

    document.querySelectorAll('input[name="count"]').forEach(radio => {
      radio.addEventListener('change', () => {
        buildMemberRows(parseInt(radio.value, 10));
        hideResultArea();
        hideError();
        scheduleRoundAutosave();
      });
    });

    document.getElementById('members-area').addEventListener('change', event => {
      if (!event.target.classList.contains('inp-name-select')) return;

      const row = event.target.closest('.member-row');
      if (!row) return;

      const selected = event.target.value;
      const nameInput = row.querySelector('.inp-name');
      const transitInput = row.querySelector('.inp-transit');

      if (selected === '__manage__') {
        event.target.value = '__new__';
        openMemberManager();
        return;
      }

      if (selected === '__new__' || selected === '') {
        nameInput.value = '';
        nameInput.focus();
        hideResultArea();
        scheduleRoundAutosave();
        return;
      }

      const profile = appState.memberProfiles.find(p => p.id === selected);
      if (!profile) return;
      nameInput.value = profile.name;
      transitInput.value = String(profile.defaultExpense);
      hideResultArea();
      scheduleRoundAutosave();
    });

    document.getElementById('members-area').addEventListener('input', event => {
      if (
        event.target.classList.contains('inp-name') ||
        event.target.classList.contains('inp-transit') ||
        event.target.classList.contains('inp-car') ||
        event.target.classList.contains('inp-other-pay') ||
        event.target.classList.contains('inp-other-recv')
      ) {
        hideResultArea();
        scheduleRoundAutosave();
      }
    });

    document.getElementById('calc-btn').addEventListener('click', () => {
      hideError();
      const members = sanitizeMembersForRound();
      const errMsg = validate(members);
      if (errMsg) {
        showError(errMsg);
        return;
      }

      if (!appState.titleManuallyEdited) {
        const date = appState.currentRoundData?.date || ymdToday();
        const autoTitle = makeTitleFromMembers(date, members);
        document.getElementById('round-title-display').textContent = autoTitle;
        document.getElementById('round-title-input').value = autoTitle;
        if (appState.currentRoundData) {
          appState.currentRoundData.title = autoTitle;
          appState.currentRoundData.titleManuallyEdited = false;
        }
      }

      const results = calcBurdens(members);
      const settlement = calcTransactions(results);
      const totalAmount = members.reduce((sum, m) => sum + m.transit + m.car, 0);
      const perPersonAmount = Math.round(totalAmount / members.length);

      renderResultFromData(members, settlement, totalAmount, perPersonAmount, true);

      updateProfilesFromMembers(members).catch(error => {
        console.error('[Firebase] メンバー更新エラー:', error);
      });

      saveCalculationToRound(members, settlement, totalAmount, perPersonAmount).catch(error => {
        console.error('[Firebase] ラウンド保存エラー:', error);
        showError('ラウンド保存に失敗しました。通信状態を確認してください。');
      });
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      if (!window.confirm('入力内容をリセットします。よろしいですか？')) {
        return;
      }
      buildMemberRows(getSelectedCount());
      hideResultArea();
      hideError();
      scheduleRoundAutosave();
    });

    document.getElementById('line-share-btn').addEventListener('click', () => {
      openLineShare();
    });

    document.getElementById('delete-round-btn').addEventListener('click', () => {
      showDeleteRoundModal();
    });

    document.getElementById('delete-modal-cancel').addEventListener('click', () => {
      closeDeleteRoundModal();
    });

    document.getElementById('delete-modal-confirm').addEventListener('click', () => {
      deleteCurrentRound().catch(error => {
        console.error('[Firebase] ラウンド削除エラー:', error);
        showError('ラウンド削除に失敗しました。通信状態を確認してください。');
      });
    });

    document.getElementById('delete-round-modal').addEventListener('click', event => {
      if (event.target.id === 'delete-round-modal') {
        closeDeleteRoundModal();
      }
    });

    document.getElementById('member-modal-close').addEventListener('click', () => {
      closeMemberManager();
    });

    document.getElementById('member-modal').addEventListener('click', event => {
      if (event.target.id === 'member-modal') {
        closeMemberManager();
      }
    });

    document.getElementById('member-manage-list').addEventListener('click', event => {
      if (!event.target.classList.contains('manage-delete')) return;
      const id = event.target.getAttribute('data-id');
      const profile = appState.memberProfiles.find(p => p.id === id);
      if (!profile) return;

      if (!window.confirm(`「${profile.name}」を名簿から削除します。よろしいですか？`)) {
        return;
      }

      deleteProfile(profile)
        .then(() => {
          renderMemberManager();
          scheduleRoundAutosave();
        })
        .catch(error => {
          console.error('[Firebase] メンバー削除エラー:', error);
          showError('メンバー削除に失敗しました。通信状態を確認してください。');
        });
    });

    window.addEventListener('popstate', () => {
      const roundId = parseRouteRoundId();
      if (roundId) {
        openRoundDetail(roundId, false);
      } else {
        openRoundList(false);
      }
    });
  }

  function bootRoute() {
    const roundId = parseRouteRoundId();
    if (roundId) {
      openRoundDetail(roundId, false);
      return;
    }
    renderRoundsList();
    openRoundList(false);
  }

  bindEvents();
  bootRoute();
  initFirebase();

  if ('serviceWorker' in navigator &&
      (location.protocol === 'https:' || location.protocol === 'http:')) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(() => console.log('[SW] 登録完了'))
        .catch((err) => console.warn('[SW] 登録失敗:', err));
    });
  }
</script>
</body>
</html>
